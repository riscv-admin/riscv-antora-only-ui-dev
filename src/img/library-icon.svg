<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .blue { fill:#0A2E63; stroke:#0A2E63; }
      .gold { fill:#FDB515; stroke:#FDB515; }
      .line { fill:none; stroke:#0A2E63; stroke-width:8; stroke-linejoin:round; }
      .white { fill:#FFFFFF; stroke:#0A2E63; stroke-width:8; }
      .text {
        font-family: Arial, Helvetica, sans-serif;
        fill:#0A2E63;
        font-weight:700;
      }
    </style>
  </defs>

  <!-- outer shape -->
  <path class="white"
        d="M160 850
           L160 320
           Q190 220 330 180
           Q512 120 694 180
           Q834 220 864 320
           L864 850
           Q864 900 820 900
           L204 900
           Q160 900 160 850 Z"/>

  <!-- arch -->
  <path class="line"
        d="M200 300
           Q512 90 824 300"/>

  <path class="line"
        d="M240 300
           Q512 140 784 300"/>

  <!-- columns -->
  <rect x="180" y="300" width="42" height="520" rx="8" class="white"/>
  <rect x="802" y="300" width="42" height="520" rx="8" class="white"/>

  <!-- shelves -->
  <rect x="230" y="420" width="564" height="12" class="blue"/>
  <rect x="230" y="620" width="564" height="12" class="blue"/>
  <rect x="230" y="810" width="564" height="12" class="blue"/>

  <!-- books top -->
  <rect x="260" y="310" width="34" height="110" class="blue"/>
  <rect x="300" y="305" width="40" height="115" class="gold"/>
  <rect x="346" y="325" width="28" height="95" class="white"/>
  <rect x="380" y="315" width="30" height="105" class="white"/>

  <rect x="720" y="310" width="36" height="110" class="white"/>
  <rect x="646" y="350" width="64" height="28" class="white"/>
  <rect x="646" y="382" width="64" height="24" class="gold"/>

  <!-- logo -->
  <rect x="450" y="200" width="124" height="124" rx="18" class="white"/>
  <path d="M485 240 L512 210 L548 240 L548 290 L485 290 Z"
        class="gold"/>
  <path d="M485 290 L485 210 L512 240 L512 290 Z"
        class="blue"/>

  <!-- center sign -->
  <rect x="300" y="470" width="424" height="120" rx="14" class="white"/>

  <text x="512" y="535"
        text-anchor="middle"
        class="text"
        font-size="72">
    RISC-V
  </text>

  <text x="512" y="585"
        text-anchor="middle"
        class="text"
        font-size="42"
        letter-spacing="4">
    LIBRARY
  </text>

  <!-- bottom books -->
  <rect x="260" y="670" width="36" height="120" class="gold"/>
  <rect x="304" y="690" width="24" height="100" class="blue"/>
  <rect x="334" y="680" width="32" height="110" class="white"/>
  <rect x="372" y="690" width="28" height="100" class="white"/>

  <!-- globe -->
  <circle cx="512" cy="725" r="48" class="white"/>
  <ellipse cx="512" cy="725" rx="20" ry="48" class="line"/>
  <line x1="464" y1="725" x2="560" y2="725" class="line"/>
  <line x1="512" y1="677" x2="512" y2="773" class="line"/>

  <!-- right books -->
  <rect x="610" y="690" width="32" height="100"
        transform="rotate(12 610 690)"
        class="gold"/>

  <rect x="660" y="680" width="34" height="110" class="white"/>
  <rect x="700" y="680" width="36" height="110" class="white"/>
</svg>
